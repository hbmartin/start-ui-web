name: OSV Scanner Full

on:
  push:
    branches: [main]
  schedule:
    # Weekly full scan so newly published OSV advisories surface without a code change.
    - cron: '30 5 * * 1'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan-full:
    name: Full Scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    permissions:
      contents: read
      # Required to read the Actions run for SARIF correlation.
      actions: read
      # Required to upload SARIF results to the Security tab.
      security-events: write
    with:
      scan-args: |-
        --lockfile=pnpm-lock.yaml
